[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Functions directory
[functions]
  directory = "netlify/functions"

# SPA fallback — serve index.html for all routes so client-side navigation works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
